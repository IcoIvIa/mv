<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PV</title>
    <link rel="stylesheet" href="/css/common.css">
</head>

<body>
    <!-- 再生・停止ボタン -->
    <button id="playButton">再生</button>
    <button id="pauseButton">一時停止</button>
    <button id="stopButton">停止</button>

    <!-- 波形表示 -->
    <canvas id="waveform" width="390" height="100"></canvas>

    <div class="layout flex">
        <!-- ステージ画面（アニメーション表示画面） -->
        <div class="stage__wrapper">
            <div class="stage__row flex">
                <div data-position="1.1"></div>
                <div data-position="1.2"></div>
                <div data-position="1.3"></div>
                <div data-position="1.4"></div>
            </div>
            <div class="stage__row flex">
                <div data-position="2.1"></div>
                <div data-position="2.2"></div>
                <div data-position="2.3"></div>
                <div data-position="2.4"></div>
            </div>
            <div class="stage__row flex">
                <div data-position="3.1"></div>
                <div data-position="3.2"></div>
                <div data-position="3.3"></div>
                <div data-position="3.4"></div>
            </div>
            <div class="stage__row flex">
                <div data-position="4.1"></div>
                <div data-position="4.2"></div>
                <div data-position="4.3"></div>
                <div data-position="4.4"></div>
            </div>
        </div>

        <div class="sidebar">
            <!-- 音楽ファイルの読み込み -->
            <input type="file" id="fileInput" class="sidebar__file-input" accept=".mp3,.wav" >
            <!-- ステップシーケンサー -->
            <canvas id="sequencer" class="sidebar__sequencer"></canvas>

            <div class="sidebar__motion-picker" id="motionPicker">
                <div>floodGrid</div>
                <div>walkGrid</div>
            </div>
        </div>
        
    </div>

    <!-- JSの読み込み（type="module"でimport/exportが使える） -->
    <script type="module" src="js/main.js"></script>
    <script>
        "use strict";

    // 最小化処理
    function handleToggleClass (idName,className){
        document.getElementById(`{$idName}`).classList.toggle(`{$className}--collapsed`)
    };

    handleToggleClass(fileInput,sidebar__file-input);
    handleToggleClass(sequencer,sidebar__sequencer)
    handleToggleClass(motionPicker,sidebar__motion-picker)

    </script>



</body>

</html>
